name: 更新處置股資料

on:
  schedule:
    - cron: '0 * * * *'   # 每小時整點執行（UTC，台灣時間 +8）
  workflow_dispatch:       # 也可在 GitHub Actions 頁面手動執行

permissions:
  contents: write          # 允許 Actions 寫入 data.json 並 push

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取資料並產生 data.json
        run: python fetch_data.py

      - name: 提交並推送 data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update disposal stocks data"
          git push
